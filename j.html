      <script>
const hamburger = document.getElementById('hamburger');
const menu = document.querySelector('.menu-b');

let isScrollingFromLink = false;   // Flag untuk mencegah close saat klik link

function closeMenu() {
    hamburger.classList.remove('active');
    menu.classList.remove('active');
}

// Toggle menu
hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    menu.classList.toggle('active');
});

// Auto close saat scroll (tapi tidak jika dari klik link)
let lastScroll = 0;
window.addEventListener('scroll', () => {
    if (menu.classList.contains('active') && !isScrollingFromLink) {
        const currentScroll = window.scrollY;
        
        if (Math.abs(currentScroll - lastScroll) > 20) {
            closeMenu();
        }
        lastScroll = currentScroll;
    }
});

document.querySelectorAll('.menu-b a').forEach(link => {
    link.addEventListener('click', () => {
        isScrollingFromLink = true;
        
        setTimeout(() => {
            closeMenu();
            isScrollingFromLink = false;
        }, 200);
    });
});


</script>

<script>
// Lightbox Improved + Disable Scroll
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const closeBtn = document.querySelector('.close');
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');

let currentIndex = 0;
let images = [];

function initLightbox() {
    images = Array.from(document.querySelectorAll('.container .card img'));
    
    images.forEach((img, index) => {
        img.style.cursor = 'pointer';
        img.addEventListener('click', () => {
            currentIndex = index;
            showImage();
        });
    });
}

function showImage() {
    lightbox.style.display = 'flex';
    document.body.classList.add('lightbox-active');   // ← Tambahkan ini
    
    lightboxImg.style.opacity = '0';
    setTimeout(() => {
        lightboxImg.src = images[currentIndex].src;
        lightboxImg.style.opacity = '1';
    }, 50);
}

function hideLightbox() {
    lightbox.style.display = 'none';
    document.body.classList.remove('lightbox-active');   // ← Tambahkan ini
}

// Navigation functions
function goToPrev() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
}

function goToNext() {
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
}

// Event Listeners
closeBtn.addEventListener('click', hideLightbox);
prevBtn.addEventListener('click', goToPrev);
nextBtn.addEventListener('click', goToNext);

// Swipe
let touchStartX = 0;
lightbox.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
}, false);

lightbox.addEventListener('touchend', (e) => {
    const touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 80) {
        if (diff > 0) goToNext();
        else goToPrev();
    }
}, false);

// Klik area kiri/kanan (hitbox besar)
lightbox.addEventListener('click', (e) => {
    if (e.target === closeBtn) {
        hideLightbox();
        return;
    }
    
    const rect = lightbox.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    
    if (clickX < rect.width * 0.35) {
        goToPrev();
    } else if (clickX > rect.width * 0.65) {
        goToNext();
    }
});

// Keyboard
document.addEventListener('keydown', (e) => {
    if (lightbox.style.display === 'flex') {
        if (e.key === 'Escape') hideLightbox();
        if (e.key === 'ArrowLeft') goToPrev();
        if (e.key === 'ArrowRight') goToNext();
    }
});

// Inisialisasi
window.addEventListener('load', initLightbox);
</script>
